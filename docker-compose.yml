version: '3.8'

services:
  smtp-relay:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloudflare-smtp-relay
    container_name: cloudflare-smtp-relay
    restart: unless-stopped
    ports:
      - "587:587"
    volumes:
      - ./config.yml:/app/config.yml:ro
    environment:
      - SMTP_HOST=0.0.0.0
      - SMTP_PORT=587
      - SMTP_RELAY_CONFIG_PATH=/app/config.yml
